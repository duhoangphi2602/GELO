services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: gelo_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hoangphi2602}
      POSTGRES_DB: ${POSTGRES_DB:-gelo_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend Service
  backend:
    build:
      context: ./gelo_backend
      dockerfile: Dockerfile
    container_name: gelo_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hoangphi2602}@db:5432/${POSTGRES_DB:-gelo_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-gelo-jwt-secret-key-2026-change-in-production}
      - AI_SERVICE_URL=http://ai:8000
    env_file:
      - ./gelo_backend/.env
    depends_on:
      - db

  # AI Service
  ai:
    build:
      context: ./gelo_ai
      dockerfile: Dockerfile
    container_name: gelo_ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://backend:3000
      - AI_PORT=8000
    env_file:
      - ./gelo_ai/.env

  # Frontend Service
  frontend:
    build:
      context: ./gelo_frontend
      dockerfile: Dockerfile
    container_name: gelo_frontend
    restart: always
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    env_file:
      - ./gelo_frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data:
